<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1025"/>
      <stop offset="100%" stop-color="#0a0a08"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Subtle border glow -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" fill="none" stroke="#f59e0b" stroke-opacity="0.2"/>
  <!-- Treble clef stylized as soundwave -->
  <path d="M10 22 Q10 14 16 10 Q22 6 22 12 Q22 16 18 18 Q14 20 14 24" fill="none" stroke="url(#glow)" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Note head -->
  <ellipse cx="14" cy="24" rx="3" ry="2.2" fill="#f59e0b" transform="rotate(-20 14 24)"/>
  <!-- Accent dot -->
  <circle cx="23" cy="9" r="1.5" fill="#7c3aed" opacity="0.8"/>
</svg>
